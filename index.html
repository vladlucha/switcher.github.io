<html>

<head>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>

</head>

<body>
  <a class="command-btn on" id="id_1" href="http://upcloud.su:3060/led/3/set?lightsOn=1 ">On</a>

<style>

@import url('https://fonts.googleapis.com/css?family=Roboto:900&display=swap');

body{
    background-color: #1C1C1E;
}

a{
    width: 100%;
    max-height: 500px;
    display: block;
    background-color;
    margin: 32px 0;
    border-radius: 16px;
    line-height: 500px;
    font-size: 64px;
    text-align: center;
    text-decoration: none;
    color: black;
    background-color: #554433;
    opacity: 0.9;
    transition: 0.3s;

    font-family: 'Roboto', sans-serif;
    font-weight: bold;
}

.on{
    background-color: #32D74B;        
}

.off{
    background-color: #FF453A;
}

a:hover{
    opacity: 1;

</style>

<script>
$('.command-btn').click(function() {
  console.log('click');

  var link = $(this).attr('href');
  $.get(link, function(r) {
    console.log(r);
  });

  return false;
